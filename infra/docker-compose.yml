services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-darklife}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    working_dir: /app/apps/api
    env_file: ../.env
    environment:
      - PYTHONPATH=/app
      - SERVICE_NAME=api
    ports:
      - "8000:8000"
    volumes:
      - ../content:/content
      - ../output:/output:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_CLERK_ENABLED: ${VITE_CLERK_ENABLED:-false}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
    env_file: ../.env
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 5

  renderer:
    build:
      context: ..
      dockerfile: services/renderer/Dockerfile
    command: python -u -m services.renderer.poller
    env_file: ../.env
    environment:
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      SERVICE_NAME: renderer
    volumes:
      - ../content:/content
      - ../output:/output
      - ../local/xtts:/opt/xtts:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "services.renderer.healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - renderer

  refinement:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    command: python -u -m services.refinement.poller
    env_file: ../.env
    environment:
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      SERVICE_NAME: refinement
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "from pathlib import Path; import time; p=Path('/tmp/renderer/refinement_heartbeat'); raise SystemExit(0 if p.exists() and time.time()-p.stat().st_mtime < 60 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5

  scheduler:
    build:
      context: ..
      dockerfile: services/renderer/Dockerfile
    command: python -u services/scheduler/main.py
    env_file: ../.env
    environment:
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      SERVICE_NAME: scheduler
    volumes:
      - ../content:/content
      - ../output:/output
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "from pathlib import Path; import time; p=Path('/tmp/renderer/scheduler_heartbeat'); raise SystemExit(0 if p.exists() and time.time()-p.stat().st_mtime < 3900 else 1)"
      start_period: 20s
      interval: 30s
      timeout: 5s
      retries: 3
    profiles:
      - scheduler

  publisher:
    build:
      context: ..
      dockerfile: services/publisher/Dockerfile
    env_file: ../.env
    environment:
      SERVICE_NAME: publisher
    volumes:
      - ../output:/output
      - ../secrets/client_secret.json:/secrets/client_secret.json:ro
      - ../secrets/token.json:/secrets/token.json
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "services.publisher.healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - publisher

  insights:
    build:
      context: ..
      dockerfile: services/insights/Dockerfile
    env_file: ../.env
    environment:
      SERVICE_NAME: insights
    volumes:
      - ../secrets/client_secret.json:/secrets/client_secret.json:ro
      - ../secrets/token.json:/secrets/token.json
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "services.insights.healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - insights

  reddit_ingestor:
    build:
      context: ..
      dockerfile: services/reddit_ingestor/Dockerfile
    env_file: ../.env
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - ops

volumes:
  postgres_data:
  redis_data:
